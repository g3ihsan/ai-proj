<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workforce Roster Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Roster Viewer</h1>
          <p>Local solver API</p>
        </div>
        <div class="status-panel" aria-live="polite">
          <span class="status-dot" id="service-dot"></span>
          <span id="service-status">API not checked</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel controls-panel">
          <div class="panel-header">
            <h2>Connection</h2>
            <button type="button" class="ghost-button" id="check-api">Check API</button>
          </div>
          <label class="field">
            <span>API base URL</span>
            <input id="api-base" type="url" />
          </label>
          <div class="meta-grid" id="metadata-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>JSON Solve</h2>
            <div class="button-row">
              <button type="button" class="ghost-button" id="load-sample-json">Sample</button>
              <button type="button" class="primary-button" id="solve-json">Solve</button>
            </div>
          </div>
          <label class="field compact-field">
            <span>Response mode</span>
            <select id="response-mode">
              <option value="compact">compact</option>
              <option value="standard" selected>standard</option>
              <option value="debug">debug</option>
            </select>
          </label>
          <textarea id="json-request" spellcheck="false"></textarea>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>CSV Solve</h2>
            <div class="button-row">
              <button type="button" class="ghost-button" id="load-demo-csvs">Load Demo CSVs</button>
              <button type="button" class="primary-button" id="solve-csv">Upload & Solve</button>
            </div>
          </div>
          <p class="helper-text" id="csv-demo-status">Upload the three CSV files or load the checked-in demo files.</p>
          <div class="file-grid">
            <label class="field">
              <span>employees.csv</span>
              <input id="employees-csv" type="file" accept=".csv,text/csv" />
            </label>
            <label class="field">
              <span>shifts.csv</span>
              <input id="shifts-csv" type="file" accept=".csv,text/csv" />
            </label>
            <label class="field">
              <span>demand.csv</span>
              <input id="demand-csv" type="file" accept=".csv,text/csv" />
            </label>
          </div>
          <div class="option-grid">
            <label class="field">
              <span>Min rest hours</span>
              <input id="min-rest-hours" type="number" value="8" min="0" />
            </label>
            <label class="field">
              <span>Max consecutive days</span>
              <input id="max-consecutive-days" type="number" value="5" min="1" />
            </label>
            <label class="field">
              <span>Shortage penalty</span>
              <input id="shortage-penalty" type="number" value="1000" min="0" />
            </label>
            <label class="field">
              <span>Time limit seconds</span>
              <input id="time-limit" type="number" value="5" min="0.1" max="30" step="0.1" />
            </label>
            <label class="field">
              <span>Seed</span>
              <input id="seed" type="number" value="1" step="1" />
            </label>
            <label class="toggle-field">
              <input id="use-warm-start" type="checkbox" />
              <span>Use warm start</span>
            </label>
          </div>
        </section>

        <section class="panel results-panel">
          <div class="panel-header">
            <h2>Roster Results</h2>
            <div class="button-row">
              <button type="button" class="ghost-button" id="submit-job">Submit Job</button>
              <button type="button" class="ghost-button" id="download-csv" disabled>Download CSV</button>
            </div>
          </div>
          <div class="summary-strip" id="summary-strip"></div>
          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="assignments" type="button">Assignments</button>
            <button class="tab" data-tab="shortages" type="button">Shortages</button>
            <button class="tab" data-tab="metrics" type="button">Metrics</button>
            <button class="tab" data-tab="issues" type="button">Issues</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="result-head"></thead>
              <tbody id="result-body"></tbody>
            </table>
          </div>
          <pre id="message-log" aria-live="polite"></pre>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
